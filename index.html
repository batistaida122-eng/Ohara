<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ohara</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --accent:#d4af37; --accent2:#ff6b6b;
    --text:#eef1f5; --muted:#9aa3b2; --border:#262a33;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:80px;
  }
  header{
    padding:18px 16px 10px; position:sticky; top:0; background:var(--bg);
    z-index:10; border-bottom:1px solid var(--border);
  }
  h1{font-size:20px; margin:0 0 4px; color:var(--accent); letter-spacing:1px;}
  .sub{color:var(--muted); font-size:13px;}
  main{padding:16px; max-width:680px; margin:0 auto;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:16px; margin-bottom:14px;
  }
  .card h2{font-size:15px; margin:0 0 12px; color:var(--accent);}
  input, textarea, select{
    width:100%; background:#11141a; border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:10px 12px; font-size:14px; margin-bottom:8px;
  }
  textarea{min-height:70px; resize:vertical;}
  button{
    border:none; border-radius:10px; padding:11px 16px; font-size:14px; font-weight:600;
    cursor:pointer; color:#0f1115;
  }
  .btn-main{background:var(--accent); width:100%;}
  .btn-secondary{background:#2a2f3a; color:var(--text);}
  .btn-danger{background:var(--accent2); color:#fff;}
  .btn-small{padding:6px 10px; font-size:12px; border-radius:8px;}
  .row{display:flex; gap:8px;}
  .row > *{flex:1;}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:20px 0;}
  .badge{
    font-size:11px; padding:3px 8px; border-radius:20px; background:#262a33; color:var(--muted);
  }
  a.btn-whats{
    display:block; text-align:center; text-decoration:none; background:#25D366; color:#fff;
    border-radius:10px; padding:11px 16px; font-size:14px; font-weight:600;
  }
  nav{
    position:fixed; bottom:0; left:0; right:0; display:flex;
    background:var(--card); border-top:1px solid var(--border); z-index:20;
  }
  nav button{
    flex:1; background:none; color:var(--muted); border-radius:0; padding:12px 4px;
    font-size:11px; display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  nav button.active{color:var(--accent);}
  nav button .emoji{font-size:18px;}
  .tab{display:none;}
  .tab.active{display:block;}

  /* ---------- VITRINE ---------- */
  .carro-card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    overflow:hidden; margin-bottom:18px;
  }
  .carro-fotos{
    display:flex; overflow-x:auto; scroll-snap-type:x mandatory; background:#000;
  }
  .carro-fotos img{
    width:100%; aspect-ratio:4/3; object-fit:cover; scroll-snap-align:start; flex-shrink:0;
  }
  .carro-fotos.semfoto{
    aspect-ratio:4/3; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:13px; background:#11141a;
  }
  .carro-info{padding:14px;}
  .carro-nome{font-size:17px; font-weight:700; margin:0 0 4px;}
  .carro-ano{color:var(--muted); font-size:13px; margin-bottom:8px;}
  .carro-preco{font-size:19px; font-weight:800; color:var(--accent); margin-bottom:10px;}
  .carro-desc{font-size:13px; color:var(--muted); margin-bottom:12px; line-height:1.5;}
  .indisponivel{
    text-align:center; padding:6px; background:#262a33; color:var(--muted);
    font-size:12px; border-radius:8px; margin-bottom:10px;
  }

  /* ---------- LOGIN PAINEL ---------- */
  #loginPainel{
    min-height:60vh; display:flex; align-items:center; justify-content:center;
  }
  .login-box{width:100%; max-width:320px;}

  /* ---------- FOTOS PREVIEW UPLOAD ---------- */
  .fotos-preview{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;}
  .fotos-preview img{width:60px; height:60px; object-fit:cover; border-radius:8px;}
  .progresso{font-size:12px; color:var(--muted); margin-bottom:8px;}

  .lead-item{
    background:#11141a; border-radius:10px; padding:12px; margin-bottom:8px; font-size:13px;
  }
  .lead-item .carro-ref{color:var(--accent); font-weight:700; font-size:14px;}
  .lead-item .meta{color:var(--muted); font-size:11px; margin:4px 0 8px;}
  .status-row select{margin-bottom:0;}
</style>
</head>
<body>

<header>
  <h1 id="tituloLoja">OHARA</h1>
  <div class="sub" id="subtitulo">Showroom de veículos de luxo</div>
</header>

<main>

  <!-- ===================== VITRINE PÚBLICA ===================== -->
  <div id="viewVitrine" class="tab active">
    <div id="listaVitrine"><div class="empty">Carregando estoque...</div></div>
  </div>

  <!-- ===================== LOGIN DO PAINEL ===================== -->
  <div id="loginPainel" class="tab">
    <div class="login-box">
      <div class="card">
        <h2>🔒 Painel Ohara</h2>
        <input type="password" id="inputSenha" placeholder="Senha">
        <button class="btn-main" onclick="tentarLogin()">Entrar</button>
        <div class="sub" id="msgLogin" style="margin-top:8px;"></div>
      </div>
    </div>
  </div>

  <!-- ===================== PAINEL PRIVADO ===================== -->
  <div id="viewPainel" style="display:none;">

    <div class="tab active" id="tabEstoque">
      <div class="card">
        <h2>🚘 Cadastrar carro</h2>
        <input id="cMarca" placeholder="Marca (ex: Porsche)">
        <input id="cModelo" placeholder="Modelo (ex: 911 Carrera)">
        <input id="cAno" placeholder="Ano (ex: 2023)">
        <input id="cPreco" placeholder="Preço (ex: 890000)" inputmode="numeric">
        <textarea id="cDesc" placeholder="Descrição / detalhes"></textarea>
        <input type="file" id="cFotos" accept="image/*" multiple capture="environment">
        <div class="fotos-preview" id="previewFotos"></div>
        <div class="progresso" id="progressoUpload"></div>
        <button class="btn-main" onclick="salvarCarro()">Salvar carro</button>
      </div>

      <div class="card">
        <h2>📦 Estoque atual</h2>
        <div id="listaEstoque"><div class="empty">Nenhum carro cadastrado</div></div>
      </div>
    </div>

    <div class="tab" id="tabLeads">
      <div class="card">
        <h2>📋 Leads recebidos</h2>
        <div id="listaLeads"><div class="empty">Nenhum lead ainda</div></div>
      </div>
    </div>

    <div class="tab" id="tabConfig">
      <div class="card">
        <h2>⚙️ Configurações</h2>
        <label class="sub">Nome da loja</label>
        <input id="cfgNome" placeholder="Ohara">
        <label class="sub">WhatsApp (com DDD, só números)</label>
        <input id="cfgWhats" placeholder="92999999999">
        <label class="sub">Nova senha do painel</label>
        <input type="password" id="cfgSenha" placeholder="Deixe em branco pra não trocar">
        <button class="btn-main" onclick="salvarConfig()">Salvar configurações</button>
        <div class="sub" id="msgConfig" style="margin-top:8px;"></div>
      </div>
      <button class="btn-secondary" style="width:100%;" onclick="sairPainel()">Sair do painel</button>
    </div>

  </div>
</main>

<nav id="navPainel" style="display:none;">
  <button class="active" onclick="trocarAba('tabEstoque', this)">
    <span class="emoji">🚘</span>Estoque
  </button>
  <button onclick="trocarAba('tabLeads', this)">
    <span class="emoji">📋</span>Leads
  </button>
  <button onclick="trocarAba('tabConfig', this)">
    <span class="emoji">⚙️</span>Config
  </button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, push, onValue, update, remove, set, get, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import {
  getStorage, ref as sref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCC5K0Upelr1fTixV2Q79HnMC6QuEQoK_8",
  authDomain: "ohara-4c017.firebaseapp.com",
  databaseURL: "https://ohara-4c017-default-rtdb.firebaseio.com",
  projectId: "ohara-4c017",
  storageBucket: "ohara-4c017.firebasestorage.app",
  messagingSenderId: "367517575184",
  appId: "1:367517575184:web:5b4fa9502145076f650295",
  measurementId: "G-6RKR362ZB0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const carrosRef = ref(db, 'ohara/carros');
const leadsRef = ref(db, 'ohara/leads');
const configRef = ref(db, 'ohara/config');

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function formatarPreco(v) {
  const n = Number(v) || 0;
  return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

// ---------- MODO: vitrine ou painel ----------
const params = new URLSearchParams(window.location.search);
const isPainel = params.get('painel') === '1';

let configAtual = { nomeLoja: 'Ohara', whatsapp: '', senhaPainel: 'ohara123' };
let logado = false;

get(configRef).then(snap => {
  if (snap.exists()) {
    configAtual = { ...configAtual, ...snap.val() };
  } else {
    set(configRef, configAtual);
  }
  document.getElementById('tituloLoja').textContent = configAtual.nomeLoja.toUpperCase();
  if (isPainel) {
    document.getElementById('cfgNome').value = configAtual.nomeLoja;
    document.getElementById('cfgWhats').value = configAtual.whatsapp;
  }
});

if (isPainel) {
  document.getElementById('viewVitrine').style.display = 'none';
  document.getElementById('loginPainel').classList.add('active');
  document.getElementById('subtitulo').textContent = 'Painel administrativo';
} else {
  document.getElementById('loginPainel').style.display = 'none';
}

// ---------- LOGIN ----------
function tentarLogin() {
  const senha = document.getElementById('inputSenha').value;
  if (senha === configAtual.senhaPainel) {
    logado = true;
    document.getElementById('loginPainel').style.display = 'none';
    document.getElementById('viewPainel').style.display = 'block';
    document.getElementById('navPainel').style.display = 'flex';
    iniciarPainel();
  } else {
    document.getElementById('msgLogin').textContent = 'Senha incorreta.';
  }
}

function sairPainel() {
  logado = false;
  document.getElementById('viewPainel').style.display = 'none';
  document.getElementById('navPainel').style.display = 'none';
  document.getElementById('loginPainel').style.display = 'flex';
  document.getElementById('inputSenha').value = '';
}

function trocarAba(id, btn) {
  document.querySelectorAll('#viewPainel .tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('#navPainel button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ---------- VITRINE PÚBLICA ----------
if (!isPainel) {
  onValue(carrosRef, (snapshot) => {
    const div = document.getElementById('listaVitrine');
    const dados = snapshot.val();
    if (!dados) {
      div.innerHTML = '<div class="empty">Nenhum carro disponível no momento</div>';
      return;
    }
    const carros = Object.entries(dados);
    div.innerHTML = '';
    carros.forEach(([id, c]) => {
      const fotosHtml = (c.fotos && c.fotos.length)
        ? `<div class="carro-fotos">${c.fotos.map(url => `<img src="${url}" loading="lazy">`).join('')}</div>`
        : `<div class="carro-fotos semfoto">Sem foto ainda</div>`;
      const msg = encodeURIComponent(`Olá! Tenho interesse no ${c.marca} ${c.modelo} (${c.ano}) anunciado na vitrine Ohara.`);
      const whatsLink = configAtual.whatsapp
        ? `https://wa.me/55${configAtual.whatsapp}?text=${msg}`
        : '#';
      div.innerHTML += `
        <div class="carro-card">
          ${fotosHtml}
          <div class="carro-info">
            <div class="carro-nome">${c.marca} ${c.modelo}</div>
            <div class="carro-ano">${c.ano}</div>
            <div class="carro-preco">${formatarPreco(c.preco)}</div>
            ${c.disponivel === false ? '<div class="indisponivel">Veículo já vendido</div>' : ''}
            <div class="carro-desc">${c.descricao || ''}</div>
            ${c.disponivel !== false ? `<a class="btn-whats" href="${whatsLink}" target="_blank" onclick="window.registrarLead('${id}','${c.marca} ${c.modelo}')">📲 Quero esse no WhatsApp</a>` : ''}
          </div>
        </div>`;
    });
  });
}

function registrarLead(carroId, carroNome) {
  push(leadsRef, {
    carroId, carroNome, criadoEm: serverTimestamp(), status: 'novo'
  });
}
window.registrarLead = registrarLead;

// ---------- PAINEL: ESTOQUE ----------
let fotosSelecionadas = [];

function iniciarPainel() {
  document.getElementById('cFotos').addEventListener('change', (e) => {
    fotosSelecionadas = Array.from(e.target.files);
    const preview = document.getElementById('previewFotos');
    preview.innerHTML = '';
    fotosSelecionadas.forEach(f => {
      const url = URL.createObjectURL(f);
      preview.innerHTML += `<img src="${url}">`;
    });
  });

  onValue(carrosRef, (snapshot) => {
    const div = document.getElementById('listaEstoque');
    const dados = snapshot.val();
    if (!dados) {
      div.innerHTML = '<div class="empty">Nenhum carro cadastrado</div>';
      return;
    }
    div.innerHTML = '';
    Object.entries(dados).reverse().forEach(([id, c]) => {
      div.innerHTML += `
        <div class="lead-item">
          <div class="carro-ref">${c.marca} ${c.modelo} (${c.ano})</div>
          <div class="meta">${formatarPreco(c.preco)} • ${c.fotos ? c.fotos.length : 0} foto(s)</div>
          <div class="row">
            <button class="btn-secondary btn-small" onclick="alternarDisponivel('${id}', ${c.disponivel === false})">
              ${c.disponivel === false ? 'Marcar disponível' : 'Marcar vendido'}
            </button>
            <button class="btn-danger btn-small" onclick="excluirCarro('${id}')">Excluir</button>
          </div>
        </div>`;
    });
  });

  onValue(leadsRef, (snapshot) => {
    const div = document.getElementById('listaLeads');
    const dados = snapshot.val();
    if (!dados) {
      div.innerHTML = '<div class="empty">Nenhum lead ainda</div>';
      return;
    }
    const itens = Object.entries(dados).sort((a, b) => (b[1].criadoEm || 0) - (a[1].criadoEm || 0));
    div.innerHTML = '';
    itens.forEach(([id, l]) => {
      const hora = l.criadoEm ? new Date(l.criadoEm).toLocaleString('pt-BR') : '';
      div.innerHTML += `
        <div class="lead-item">
          <div class="carro-ref">${l.carroNome}</div>
          <div class="meta">${hora}</div>
          <div class="status-row">
            <select onchange="atualizarStatusLead('${id}', this.value)">
              <option value="novo" ${l.status === 'novo' ? 'selected' : ''}>🆕 Novo</option>
              <option value="negociando" ${l.status === 'negociando' ? 'selected' : ''}>💬 Negociando</option>
              <option value="fechado" ${l.status === 'fechado' ? 'selected' : ''}>✅ Fechado</option>
              <option value="perdido" ${l.status === 'perdido' ? 'selected' : ''}>❌ Perdido</option>
            </select>
          </div>
        </div>`;
    });
  });
}

async function salvarCarro() {
  const marca = document.getElementById('cMarca').value.trim();
  const modelo = document.getElementById('cModelo').value.trim();
  const ano = document.getElementById('cAno').value.trim();
  const preco = document.getElementById('cPreco').value.trim();
  const descricao = document.getElementById('cDesc').value.trim();

  if (!marca || !modelo) { alert('Preencha marca e modelo.'); return; }

  const carroId = uid();
  const progresso = document.getElementById('progressoUpload');
  const fotosUrls = [];

  for (let i = 0; i < fotosSelecionadas.length; i++) {
    progresso.textContent = `Enviando foto ${i + 1} de ${fotosSelecionadas.length}...`;
    const file = fotosSelecionadas[i];
    const path = `ohara/carros/${carroId}/${Date.now()}_${file.name}`;
    const storageRef = sref(storage, path);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    fotosUrls.push(url);
  }
  progresso.textContent = '';

  await set(ref(db, 'ohara/carros/' + carroId), {
    marca, modelo, ano, preco, descricao,
    fotos: fotosUrls, disponivel: true, criadoEm: serverTimestamp()
  });

  document.getElementById('cMarca').value = '';
  document.getElementById('cModelo').value = '';
  document.getElementById('cAno').value = '';
  document.getElementById('cPreco').value = '';
  document.getElementById('cDesc').value = '';
  document.getElementById('cFotos').value = '';
  document.getElementById('previewFotos').innerHTML = '';
  fotosSelecionadas = [];
}

function alternarDisponivel(id, novoValor) {
  update(ref(db, 'ohara/carros/' + id), { disponivel: novoValor });
}
function excluirCarro(id) {
  if (!confirm('Excluir este carro do estoque?')) return;
  remove(ref(db, 'ohara/carros/' + id));
}
function atualizarStatusLead(id, status) {
  update(ref(db, 'ohara/leads/' + id), { status });
}

// ---------- CONFIGURAÇÕES ----------
function salvarConfig() {
  const nomeLoja = document.getElementById('cfgNome').value.trim() || 'Ohara';
  const whatsapp = document.getElementById('cfgWhats').value.trim();
  const novaSenha = document.getElementById('cfgSenha').value.trim();

  const updates = { nomeLoja, whatsapp };
  if (novaSenha) updates.senhaPainel = novaSenha;

  update(configRef, updates).then(() => {
    configAtual = { ...configAtual, ...updates };
    document.getElementById('tituloLoja').textContent = nomeLoja.toUpperCase();
    document.getElementById('msgConfig').textContent = '✔ Configurações salvas';
    document.getElementById('cfgSenha').value = '';
    setTimeout(() => document.getElementById('msgConfig').textContent = '', 2500);
  });
}

window.tentarLogin = tentarLogin;
window.sairPainel = sairPainel;
window.trocarAba = trocarAba;
window.salvarCarro = salvarCarro;
window.alternarDisponivel = alternarDisponivel;
window.excluirCarro = excluirCarro;
window.atualizarStatusLead = atualizarStatusLead;
window.salvarConfig = salvarConfig;
</script>
</body>
</html>
